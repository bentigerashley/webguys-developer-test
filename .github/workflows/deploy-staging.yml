name: Validate and deploy staging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-deployment
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      WORDPRESS_GRAPHQL_URL: ${{ vars.WORDPRESS_GRAPHQL_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Validate public runtime configuration
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$WORDPRESS_GRAPHQL_URL" ]]; then
            echo "WORDPRESS_GRAPHQL_URL is not configured; validating the supported fallback build."
            exit 0
          fi
          url_pattern='^https://[A-Za-z0-9._~:/?@!$%&*+,;=-]+$'
          [[ "$WORDPRESS_GRAPHQL_URL" =~ $url_pattern ]] || { echo "WORDPRESS_GRAPHQL_URL must be a public HTTPS URL" >&2; exit 1; }
      - name: Lint frontend
        run: npm run lint
        working-directory: frontend
      - name: Check frontend types
        run: npm run typecheck
        working-directory: frontend
      - name: Test frontend
        run: npm test -- --run
        working-directory: frontend
      - name: Test WordPress plugins
        run: docker run --rm -v "$GITHUB_WORKSPACE:/app:ro" -w /app php:8.2-cli@sha256:90db578653480744d7137d42e26055bc12c75099eab0cbb38bc8da79a94b1443 php spaceflight-news-cache/tests/run.php
      - name: Test deployment scripts
        run: docker run --rm -v "$GITHUB_WORKSPACE:/repo:ro" -w /repo ubuntu:24.04@sha256:4fbb8e6a8395de5a7550b33509421a2bafbc0aab6c06ba2cef9ebffbc7092d90 bash scripts/tests/deployment-scripts.test.sh
      - name: Build standalone frontend
        run: npm run build
        working-directory: frontend
      - name: Package immutable release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release/.next
          cp -a frontend/.next/standalone/. release/
          cp -a frontend/.next/static release/.next/static
          cp -a frontend/public release/public
          printf 'WORDPRESS_GRAPHQL_URL=%s\n' "$WORDPRESS_GRAPHQL_URL" > release/.env.production
          tar -czf "fdi-frontend-${GITHUB_SHA}.tgz" -C release .
      - name: Upload verified release
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fdi-frontend-${{ github.sha }}
          path: fdi-frontend-${{ github.sha }}.tgz
          if-no-files-found: error
          retention-days: 7

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main' && vars.STAGING_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: staging
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
      SSH_PORT: ${{ vars.SSH_PORT }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_BASE: ${{ vars.DEPLOY_BASE }}
      SERVICE_NAME: ${{ vars.SERVICE_NAME }}
      HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
    steps:
      - name: Check out deployment scripts
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: scripts
      - name: Download verified release
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: fdi-frontend-${{ github.sha }}
      - name: Validate deployment settings
        shell: bash
        run: |
          set -euo pipefail
          for name in SSH_HOST SSH_USER SSH_PRIVATE_KEY SSH_KNOWN_HOSTS SSH_PORT DEPLOY_PATH DEPLOY_BASE SERVICE_NAME HEALTHCHECK_URL; do
            test -n "${!name:-}" || { echo "Required staging setting $name is missing" >&2; exit 1; }
          done
          [[ "$SSH_PORT" =~ ^[0-9]{1,5}$ ]] && (( SSH_PORT >= 1 && SSH_PORT <= 65535 ))
          path_pattern='^/[A-Za-z0-9._/-]+$'
          [[ "$DEPLOY_BASE" =~ $path_pattern ]] && [[ "$DEPLOY_BASE" != "/" ]]
          [[ "$DEPLOY_PATH" =~ $path_pattern ]] && [[ "$DEPLOY_PATH" == "$DEPLOY_BASE/"* ]]
          [[ "$(realpath -m "$DEPLOY_BASE")" == "$DEPLOY_BASE" ]]
          [[ "$(realpath -m "$DEPLOY_PATH")" == "$DEPLOY_PATH" ]]
          [[ "$SERVICE_NAME" =~ ^[A-Za-z0-9@._-]+$ ]]
          health_pattern='^https?://[A-Za-z0-9._~:/?@!$%&*+,;=-]+$'
          [[ "$HEALTHCHECK_URL" =~ $health_pattern ]]
          expected_host="$SSH_HOST"; [[ "$SSH_PORT" == "22" ]] || expected_host="[$SSH_HOST]:$SSH_PORT"
          grep -Fq "$expected_host " <<< "$SSH_KNOWN_HOSTS" || { echo "SSH_KNOWN_HOSTS does not contain the selected host and port" >&2; exit 1; }
      - name: Configure strict SSH authentication
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Upload and activate release
        shell: bash
        run: |
          set -euo pipefail
          archive="fdi-frontend-${GITHUB_SHA}.tgz"
          remote_archive="$DEPLOY_PATH/incoming/$archive"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH/incoming'"
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes "$archive" "$SSH_USER@$SSH_HOST:$remote_archive"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" \
            "bash -s -- '$GITHUB_SHA' '$remote_archive' '$DEPLOY_PATH' '$DEPLOY_BASE' '$SERVICE_NAME' '$HEALTHCHECK_URL'" < scripts/activate-release.sh
